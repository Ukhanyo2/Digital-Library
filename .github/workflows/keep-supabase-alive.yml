name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6 AM UTC
  workflow_dispatch:  # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo '${{ secrets.SUPABASE_PROJECTS_JSON }}' | jq -c '.[]' | while read project; do
            URL=$(echo "$project" | jq -r '.url')
            KEY=$(echo "$project" | jq -r '.anon_key')
            curl -X GET "$URL/auth/v1/health" -H "apikey: $KEY"
            echo "Pinged $URL"
          done
